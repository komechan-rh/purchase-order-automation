services:
  backend:
    build:
      context: .
    container_name: purchase-backend
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/app",
      ]
    env_file:
      - ./.env
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
